<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusEats – Vendor Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: #0f0f0f; color: #f1f1f1; }
    .navbar { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; box-shadow: none; }
    .navbar-logo { color: #f97316; }
    .navbar-links a { color: #888; }
    .navbar-links a:hover, .navbar-links a.active { color: #f97316; }

    .dashboard-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .dashboard-header { margin-bottom: 24px; }
    .dashboard-header h2 { font-size: 22px; font-weight: 700; color: #f1f1f1; }
    .dashboard-header p  { color: #555; font-size: 14px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
    }

    .stat-box .val {
      font-size: 28px;
      font-weight: 800;
      color: #f97316;
      display: block;
    }

    .stat-box .lbl {
      font-size: 13px;
      color: #555;
      margin-top: 4px;
    }

    .order-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .order-card:hover { border-color: #f97316; }

    .order-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .order-id {
      font-size: 16px;
      font-weight: 700;
      color: #f97316;
    }

    .order-time { font-size: 12px; color: #555; }

    .order-items-list {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
      line-height: 1.8;
    }

    .order-card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-location { font-size: 13px; color: #555; }
    .order-total    { font-size: 16px; font-weight: 700; color: #f97316; }

    .order-actions  { display: flex; gap: 10px; margin-top: 14px; }

    .btn-accept {
      background: #22c55e;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-accept:hover { opacity: 0.85; }

    .btn-reject {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-reject:hover { opacity: 0.85; }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-pending   { background: #2a2000; color: #f59e0b; }
    .badge-confirmed { background: #002a1a; color: #22c55e; }
    .badge-rejected  { background: #2a0000; color: #ef4444; }
    .badge-delivered { background: #00142a; color: #38bdf8; }

    .no-orders {
      text-align: center;
      padding: 60px 20px;
      color: #444;
      font-size: 16px;
    }

    .no-orders div { font-size: 48px; margin-bottom: 12px; }

    .refresh-btn {
      background: #1a1a1a;
      color: #f97316;
      border: 1.5px solid #f97316;
      padding: 8px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover { background: #f97316; color: white; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo">🍱 CampusEats</div>
    <ul class="navbar-links">
      <li><a href="vendor.html" class="active">Dashboard</a></li>
      <li><a href="index.html">Logout</a></li>
    </ul>
    <div style="font-size:13px; color:#555;">👨‍🍳 Vendor Panel</div>
  </nav>

  <div class="dashboard-container">

    <div class="dashboard-header">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <h2>Incoming Orders 📋</h2>
          <p>Accept or reject orders from students and staff</p>
        </div>
        <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box">
        <span class="val" id="stat-total">0</span>
        <span class="lbl">Total Orders</span>
      </div>
      <div class="stat-box">
        <span class="val" id="stat-revenue">₹0</span>
        <span class="lbl">Total Revenue</span>
      </div>
      <div class="stat-box">
        <span class="val" id="stat-pending">0</span>
        <span class="lbl">Pending Orders</span>
      </div>
    </div>

    <!-- Orders List -->
    <div id="ordersList">
      <div class="no-orders">
        <div>⏳</div>
        Loading orders...
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API = 'http://localhost:3000/api';

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function timeAgo(dateStr) {
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
      if (diff < 1)  return 'Just now';
      if (diff < 60) return diff + ' min ago';
      return Math.floor(diff / 60) + ' hr ago';
    }

    function updateStats(orders) {
      document.getElementById('stat-total').textContent =
        orders.length;
      document.getElementById('stat-revenue').textContent =
        '₹' + orders.reduce((s, o) => s + o.total, 0);
      document.getElementById('stat-pending').textContent =
        orders.filter(o => o.status === 'pending').length;
    }

    function updateStatus(orderId, status) {
      const token = localStorage.getItem('token');
      fetch(API + '/orders/' + orderId + '/status', {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ status })
      })
      .then(res => res.json())
      .then(() => {
        const messages = {
          confirmed:  '✅ Order #CE' + orderId + ' accepted!',
          preparing:  '👨‍🍳 Order #CE' + orderId + ' is being prepared!',
          on_the_way: '🛵 Order #CE' + orderId + ' handed to agent!',
          rejected:   '❌ Order #CE' + orderId + ' rejected.',
        };
        showToast(messages[status] || 'Status updated!');
        loadOrders();
      })
      .catch(() => showToast('❌ Could not update order'));
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersList');
      updateStats(orders);

      if (orders.length === 0) {
        container.innerHTML = `
          <div class="no-orders">
            <div>📭</div>
            No orders yet. Waiting for customers!
          </div>`;
        return;
      }

      container.innerHTML = orders.map(order => {
        const itemsList = order.items
          ? order.items.map(i =>
              `${i.emoji || '🍽️'} ${i.product_name} x${i.quantity} — ₹${i.price * i.quantity}`
            ).join('<br>')
          : 'No items';

        let actions = '';
        if (order.status === 'pending') {
          actions = `
            <div class="order-actions">
              <button class="btn-accept"
                onclick="updateStatus(${order.id}, 'confirmed')">
                ✅ Accept
              </button>
              <button class="btn-reject"
                onclick="updateStatus(${order.id}, 'rejected')">
                ❌ Reject
              </button>
            </div>`;
        } else if (order.status === 'confirmed') {
          actions = `
            <div class="order-actions">
              <button class="btn-accept"
                onclick="updateStatus(${order.id}, 'preparing')">
                👨‍🍳 Start Preparing
              </button>
            </div>`;
        } else if (order.status === 'preparing') {
          actions = `
            <div class="order-actions">
              <button class="btn-accept"
                onclick="updateStatus(${order.id}, 'on_the_way')">
                🛵 Hand to Agent
              </button>
            </div>`;
        } else if (order.status === 'on_the_way') {
          actions = `
            <div class="order-actions">
              <span style="color:#38bdf8; font-size:14px; font-weight:600;">
                🛵 Agent is delivering...
              </span>
            </div>`;
        } else if (order.status === 'delivered') {
          actions = `
            <div class="order-actions">
              <span style="color:#22c55e; font-size:14px; font-weight:600;">
                ✅ Delivered successfully!
              </span>
            </div>`;
        } else if (order.status === 'rejected') {
          actions = `
            <div class="order-actions">
              <span style="color:#ef4444; font-size:14px; font-weight:600;">
                ❌ Order was rejected
              </span>
            </div>`;
        }

        return `
          <div class="order-card">
            <div class="order-card-top">
              <div>
                <div class="order-id">#CE${order.id}</div>
                <div class="order-time">${timeAgo(order.created_at)}</div>
              </div>
              <span class="status-badge badge-${order.status}">
                ${order.status.replace('_', ' ').toUpperCase()}
              </span>
            </div>
            <div class="order-items-list">${itemsList}</div>
            <div class="order-card-bottom">
              <div class="order-location">📍 ${order.delivery_location || 'Campus'}</div>
              <div class="order-total">₹${order.total}</div>
            </div>
            ${actions}
          </div>`;
      }).join('');
    }

    function loadOrders() {
      const token = localStorage.getItem('token');
      if (!token) {
        document.getElementById('ordersList').innerHTML = `
          <div class="no-orders">
            <div>🔒</div>
            Please login first!
            <br><br>
            <a href="index.html" style="color:#f97316;">Go to Login</a>
          </div>`;
        return;
      }

      fetch(API + '/orders/all', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => res.json())
      .then(orders => {
        if (!Array.isArray(orders)) { renderOrders([]); return; }
        renderOrders(orders);
      })
      .catch(() => {
        document.getElementById('ordersList').innerHTML = `
          <div class="no-orders">
            <div>❌</div>
            Could not load orders. Is your backend running?
          </div>`;
      });
    }

    loadOrders();
    setInterval(loadOrders, 15000);
  </script>

</body>
</html>
