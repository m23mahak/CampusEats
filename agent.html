<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusEats – Agent Dashboard</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: #0f0f0f; color: #f1f1f1; }
    .navbar { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; box-shadow: none; }
    .navbar-logo { color: #f97316; }
    .navbar-links a { color: #888; }
    .navbar-links a:hover, .navbar-links a.active { color: #f97316; }

    .dashboard-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .dashboard-header { margin-bottom: 24px; }
    .dashboard-header h2 { font-size: 22px; font-weight: 700; color: #f1f1f1; }
    .dashboard-header p  { color: #555; font-size: 14px; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 20px;
      text-align: center;
    }

    .stat-box .val {
      font-size: 28px;
      font-weight: 800;
      color: #f97316;
      display: block;
    }

    .stat-box .lbl {
      font-size: 13px;
      color: #555;
      margin-top: 4px;
    }

    /* Tabs */
    .tab-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 8px 20px;
      border-radius: 10px;
      border: 1.5px solid #2a2a2a;
      background: #1a1a1a;
      color: #888;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active, .tab-btn:hover {
      background: #f97316;
      color: white;
      border-color: #f97316;
    }

    /* Order cards */
    .order-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .order-card:hover { border-color: #f97316; }

    .order-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .order-id   { font-size: 16px; font-weight: 700; color: #f97316; }
    .order-time { font-size: 12px; color: #555; margin-top: 2px; }

    .order-route {
      background: #222;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 2;
    }

    .order-route .pickup  { color: #22c55e; }
    .order-route .dropoff { color: #f97316; }

    .order-items-list {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
      line-height: 1.8;
    }

    .order-card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .order-earn  { font-size: 15px; font-weight: 700; color: #22c55e; }
    .order-total { font-size: 14px; color: #555; }

    .order-actions { display: flex; gap: 10px; margin-top: 14px; }

    .btn-pickup {
      background: #f97316;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-pickup:hover { opacity: 0.85; }

    .btn-deliver {
      background: #22c55e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-deliver:hover { opacity: 0.85; }

    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-confirmed  { background: #002a1a; color: #22c55e; }
    .badge-preparing  { background: #2a1a00; color: #fb923c; }
    .badge-on_the_way { background: #00142a; color: #38bdf8; }
    .badge-delivered  { background: #1a1a2a; color: #818cf8; }
    .badge-pending    { background: #2a2000; color: #f59e0b; }

    .no-orders {
      text-align: center;
      padding: 60px 20px;
      color: #444;
      font-size: 15px;
    }

    .no-orders div { font-size: 48px; margin-bottom: 12px; }

    .refresh-btn {
      background: #1a1a1a;
      color: #f97316;
      border: 1.5px solid #f97316;
      padding: 8px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .refresh-btn:hover { background: #f97316; color: white; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #1e293b;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo">🍱 CampusEats</div>
    <ul class="navbar-links">
      <li><a href="agent.html" class="active">My Deliveries</a></li>
      <li><a href="index.html">Logout</a></li>
    </ul>
    <div style="font-size:13px; color:#555;">🛵 Agent Panel</div>
  </nav>

  <div class="dashboard-container">

    <div class="dashboard-header">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <h2>My Deliveries 🛵</h2>
          <p>Pick up confirmed orders and deliver them across campus</p>
        </div>
        <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-box">
        <span class="val" id="stat-total">0</span>
        <span class="lbl">Total Orders</span>
      </div>
      <div class="stat-box">
        <span class="val" id="stat-active">0</span>
        <span class="lbl">Active Deliveries</span>
      </div>
      <div class="stat-box">
        <span class="val" id="stat-delivered">0</span>
        <span class="lbl">Delivered</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-buttons">
      <button class="tab-btn active" onclick="filterOrders('all', this)">All</button>
      <button class="tab-btn" onclick="filterOrders('confirmed', this)">Ready to Pickup</button>
      <button class="tab-btn" onclick="filterOrders('on_the_way', this)">On the Way</button>
      <button class="tab-btn" onclick="filterOrders('delivered', this)">Delivered</button>
    </div>

    <!-- Orders -->
    <div id="ordersList">
      <div class="no-orders">
        <div>⏳</div>
        Loading orders...
      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API = 'http://campuseats-production-f9d4.up.railway.app/api';
    let allOrders = [];
    let currentFilter = 'all';

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function timeAgo(dateStr) {
      const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
      if (diff < 1)  return 'Just now';
      if (diff < 60) return diff + ' min ago';
      return Math.floor(diff / 60) + ' hr ago';
    }

    function updateStats(orders) {
      document.getElementById('stat-total').textContent =
        orders.length;
      document.getElementById('stat-active').textContent =
        orders.filter(o => o.status === 'confirmed' || o.status === 'on_the_way').length;
      document.getElementById('stat-delivered').textContent =
        orders.filter(o => o.status === 'delivered').length;
    }

    // Update order status in backend
    function updateStatus(orderId, status) {
      const token = localStorage.getItem('token');
      fetch(API + '/orders/' + orderId + '/status', {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ status })
      })
      .then(res => res.json())
      .then(() => {
        const messages = {
          preparing:   '👨‍🍳 Order #CE' + orderId + ' marked as preparing!',
          on_the_way:  '🛵 Order #CE' + orderId + ' picked up! Head to drop location.',
          delivered:   '🎉 Order #CE' + orderId + ' delivered! Great job.',
        };
        showToast(messages[status] || 'Status updated!');
        loadOrders();
      })
      .catch(() => showToast('❌ Could not update. Is backend running?'));
    }

    function filterOrders(filter, el) {
      currentFilter = filter;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderOrders(allOrders);
    }

    function renderOrders(orders) {
      const container = document.getElementById('ordersList');
      updateStats(orders);

      // Filter based on tab
      const filtered = currentFilter === 'all'
        ? orders.filter(o => o.status !== 'pending' && o.status !== 'rejected')
        : orders.filter(o => o.status === currentFilter);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="no-orders">
            <div>📭</div>
            No orders in this category yet!
          </div>`;
        return;
      }

      container.innerHTML = filtered.map(order => {
        const itemsList = order.items
          ? order.items.map(i =>
              `${i.emoji || '🍽️'} ${i.product_name} x${i.quantity}`
            ).join('<br>')
          : 'No items';

        // Show different action buttons based on status
        let actions = '';
        if (order.status === 'confirmed') {
          actions = `
            <div class="order-actions">
              <button class="btn-pickup"
                onclick="updateStatus(${order.id}, 'on_the_way')">
                🛵 Picked Up — Start Delivery
              </button>
            </div>`;
        } else if (order.status === 'on_the_way') {
          actions = `
            <div class="order-actions">
              <button class="btn-deliver"
                onclick="updateStatus(${order.id}, 'delivered')">
                ✅ Mark as Delivered
              </button>
            </div>`;
        } else if (order.status === 'delivered') {
          actions = `
            <div class="order-actions">
              <span style="color:#22c55e; font-size:14px; font-weight:600;">
                ✅ Delivered successfully!
              </span>
            </div>`;
        }

        const badgeClass = 'badge-' + order.status.replace(' ', '_');

        return `
          <div class="order-card">
            <div class="order-card-top">
              <div>
                <div class="order-id">#CE${order.id}</div>
                <div class="order-time">${timeAgo(order.created_at)}</div>
              </div>
              <span class="status-badge ${badgeClass}">
                ${order.status.replace('_', ' ').toUpperCase()}
              </span>
            </div>

            <div class="order-route">
              <div class="pickup">
                📦 Pickup: Vendor Location
              </div>
              <div class="dropoff">
                📍 Drop: ${order.delivery_location || 'Campus'}
              </div>
            </div>

            <div class="order-items-list">${itemsList}</div>

            <div class="order-card-bottom">
              <div class="order-earn">💰 Earn ₹${Math.floor(order.total * 0.1) + 15}</div>
              <div class="order-total">Order total: ₹${order.total}</div>
            </div>

            ${actions}
          </div>`;
      }).join('');
    }

    function loadOrders() {
      const token = localStorage.getItem('token');

      if (!token) {
        document.getElementById('ordersList').innerHTML = `
          <div class="no-orders">
            <div>🔒</div>
            Please login first!
            <br><br>
            <a href="index.html" style="color:#f97316;">Go to Login</a>
          </div>`;
        return;
      }

      fetch(API + '/orders/my', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => res.json())
      .then(orders => {
        if (!Array.isArray(orders)) {
          renderOrders([]);
          return;
        }
        allOrders = orders;
        renderOrders(orders);
      })
      .catch(() => {
        document.getElementById('ordersList').innerHTML = `
          <div class="no-orders">
            <div>❌</div>
            Could not load orders.<br>Is your backend running?
          </div>`;
      });
    }

    // Load and auto refresh every 15 seconds
    loadOrders();
    setInterval(loadOrders, 15000);
  </script>

</body>
</html>
