<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusEats – Cart</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: #0f0f0f; color: #f1f1f1; }
    .navbar { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; box-shadow: none; }
    .navbar-logo { color: #f97316; }
    .navbar-links a { color: #888; }
    .navbar-links a:hover, .navbar-links a.active { color: #f97316; }

    .cart-container {
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .cart-container h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
      color: #f1f1f1;
    }

    .cart-item {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .cart-item-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .cart-emoji { font-size: 32px; }

    .cart-item-name {
      font-size: 15px;
      font-weight: 600;
      color: #f1f1f1;
    }

    .cart-item-price {
      font-size: 13px;
      color: #555;
    }

    .cart-qty {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qty-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1.5px solid #2a2a2a;
      background: #222;
      color: #f1f1f1;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      transition: all 0.2s;
    }

    .qty-btn:hover {
      background: #f97316;
      border-color: #f97316;
    }

    .cart-item-total {
      font-weight: 700;
      color: #f97316;
      font-size: 15px;
      min-width: 60px;
      text-align: right;
    }

    .cart-summary {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 20px;
      margin-top: 20px;
    }

    .cart-summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 10px;
      color: #888;
    }

    .cart-summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
      font-weight: 700;
      color: #f1f1f1;
      border-top: 1px solid #2a2a2a;
      padding-top: 14px;
      margin-top: 6px;
    }

    .cart-summary-total span:last-child {
      color: #f97316;
    }

    .btn-primary {
      width: 100%;
      background: #f97316;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #ea6c0a; }

    .empty-cart {
      text-align: center;
      padding: 80px 20px;
      color: #444;
    }

    .empty-cart div { font-size: 64px; margin-bottom: 16px; }
    .empty-cart p   { font-size: 16px; margin-bottom: 20px; }

    .empty-cart a {
      background: #f97316;
      color: white;
      padding: 12px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo">🍱 CampusEats</div>
    <ul class="navbar-links">
      <li><a href="home.html">Browse</a></li>
      <li><a href="cart.html" class="active">Cart</a></li>
      <li><a href="tracking.html">Track Order</a></li>
      <li><a href="index.html">Logout</a></li>
    </ul>
    <button class="navbar-cart" id="cartCount" onclick="window.location.href='cart.html'">
      🛒 Cart (0)
    </button>
  </nav>

  <div class="cart-container">
    <h2>Your Cart 🛒</h2>
    <div id="cartList"></div>

    <div class="cart-summary" id="cartSummary">
      <div class="cart-summary-row">
        <span>Subtotal</span>
        <span id="subtotal">₹0</span>
      </div>
      <div class="cart-summary-row">
        <span>Delivery Fee</span>
        <span>₹10</span>
      </div>
      <div class="cart-summary-total">
        <span>Total</span>
        <span id="total">₹10</span>
      </div>
      <button class="btn-primary" onclick="placeOrder()">
        Place Order →
      </button>
    </div>
  </div>

  <script>
    // Read cart directly here — no dependency on app.js loading order
    let cart = [];
    try {
      cart = JSON.parse(localStorage.getItem('cart')) || [];
    } catch(e) {
      cart = [];
    }

    const deliveryFee = 10;

    function renderCart() {
      const cartList   = document.getElementById('cartList');
      const subtotalEl = document.getElementById('subtotal');
      const totalEl    = document.getElementById('total');
      const summaryEl  = document.getElementById('cartSummary');

      if (cart.length === 0) {
        cartList.innerHTML = `
          <div class="empty-cart">
            <div>🛒</div>
            <p>Your cart is empty!</p>
            <a href="home.html">Browse Items</a>
          </div>`;
        summaryEl.style.display = 'none';
        return;
      }

      summaryEl.style.display = 'block';

      cartList.innerHTML = cart.map((item, i) => `
        <div class="cart-item">
          <div class="cart-item-left">
            <div class="cart-emoji">${item.emoji}</div>
            <div>
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">₹${item.price} each</div>
            </div>
          </div>
          <div class="cart-qty">
            <button class="qty-btn" onclick="changeQty(${i}, -1)">−</button>
            <span style="font-weight:700; color:#f1f1f1; font-size:16px;">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${i}, 1)">+</button>
          </div>
          <div class="cart-item-total">₹${item.price * item.qty}</div>
        </div>
      `).join('');

      const subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      subtotalEl.textContent = '₹' + subtotal;
      totalEl.textContent    = '₹' + (subtotal + deliveryFee);
    }

    function changeQty(index, delta) {
      cart[index].qty += delta;
      if (cart[index].qty <= 0) cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      updateCount();
    }

    function updateCount() {
      const el = document.getElementById('cartCount');
      if (el) {
        const total = cart.reduce((sum, i) => sum + i.qty, 0);
        el.textContent = '🛒 Cart (' + total + ')';
      }
    }

    function placeOrder() {
      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }
      const token = localStorage.getItem('token');
      const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0) + deliveryFee;

      if (token) {
        fetch('http://localhost:3000/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ items: cart, total, delivery_location: 'Campus' })
        })
        .then(res => res.json())
        .then(data => {
          localStorage.setItem('last_order_id', data.order_id);
          cart = [];
          localStorage.setItem('cart', JSON.stringify(cart));
          alert('🎉 Order placed successfully!');
          window.location.href = 'tracking.html';
        })
        .catch(() => {
          cart = [];
          localStorage.setItem('cart', JSON.stringify(cart));
          alert('🎉 Order placed!');
          window.location.href = 'tracking.html';
        });
      } else {
        cart = [];
        localStorage.setItem('cart', JSON.stringify(cart));
        alert('🎉 Order placed!');
        window.location.href = 'tracking.html';
      }
    }

    // Run immediately
    renderCart();
    updateCount();
  </script>

</body>
</html>
