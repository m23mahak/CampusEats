<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusEats – Track Order</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: #0f0f0f; color: #f1f1f1; }
    .navbar { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; box-shadow: none; }
    .navbar-logo { color: #f97316; }
    .navbar-links a { color: #888; }
    .navbar-links a:hover, .navbar-links a.active { color: #f97316; }

    .tracking-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .tracking-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 20px;
    }

    .tracking-card h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #f1f1f1;
    }

    .tracking-card p {
      color: #555;
      font-size: 14px;
      margin-bottom: 32px;
    }

    /* Steps */
    .steps { display: flex; flex-direction: column; }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      position: relative;
    }

    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 19px;
      top: 40px;
      width: 2px;
      height: 40px;
      background: #2a2a2a;
    }

    .step.done::after  { background: #f97316; }
    .step.active::after { background: #2a2a2a; }

    .step-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: #2a2a2a;
      flex-shrink: 0;
      z-index: 1;
    }

    .step.done .step-icon   { background: #f97316; }
    .step.active .step-icon {
      background: #f97316;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 4px rgba(249,115,22,0.2); }
      50%      { box-shadow: 0 0 0 8px rgba(249,115,22,0.1); }
    }

    .step-text { padding-bottom: 40px; }

    .step-title {
      font-size: 15px;
      font-weight: 600;
      color: #f1f1f1;
      margin-bottom: 2px;
    }

    .step-subtitle { font-size: 13px; color: #555; }

    /* Order items */
    .order-items-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .order-items-card h3 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #f1f1f1;
    }

    .order-item-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #888;
      padding: 6px 0;
      border-bottom: 1px solid #222;
    }

    .order-item-row:last-child { border-bottom: none; }

    .order-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      font-weight: 700;
      color: #f97316;
      padding-top: 12px;
      margin-top: 4px;
    }

    /* Agent card */
    .agent-card {
      background: #2a1a0a;
      border: 1px solid #3a2a1a;
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 24px;
    }

    .agent-card .agent-emoji { font-size: 36px; }

    .agent-card .agent-name {
      font-weight: 700;
      font-size: 15px;
      color: #f1f1f1;
    }

    .agent-card .agent-sub {
      font-size: 13px;
      color: #555;
    }

    .no-order {
      text-align: center;
      padding: 80px 20px;
      color: #444;
    }

    .no-order div { font-size: 64px; margin-bottom: 16px; }
    .no-order p   { font-size: 16px; margin-bottom: 20px; }
    .no-order a {
      background: #f97316;
      color: white;
      padding: 12px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
    }

    .status-update-btn {
      background: #f97316;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s;
    }

    .status-update-btn:hover { background: #ea6c0a; }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="navbar-logo">🍱 CampusEats</div>
    <ul class="navbar-links">
      <li><a href="home.html">Browse</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="tracking.html" class="active">Track Order</a></li>
      <li><a href="index.html">Logout</a></li>
    </ul>
    <button class="navbar-cart" id="cartCount" onclick="window.location.href='cart.html'">
      🛒 Cart (0)
    </button>
  </nav>

  <div class="tracking-container" id="trackingContent">
    <!-- loaded by JS -->
  </div>

  <script>
    const API = 'http://localhost:3000/api';

    // Status steps config
    const statusSteps = {
      pending:   0,
      confirmed: 1,
      preparing: 2,
      on_the_way: 3,
      delivered: 4
    };

    const steps = [
      { icon: '✅', title: 'Order Confirmed',  subtitle: 'Your order has been received'       },
      { icon: '✔️', title: 'Accepted',         subtitle: 'Vendor accepted your order'          },
      { icon: '👨‍🍳', title: 'Preparing',       subtitle: 'Vendor is preparing your order'      },
      { icon: '🛵', title: 'On the Way',       subtitle: 'Agent is heading to you'             },
      { icon: '📦', title: 'Delivered',        subtitle: 'Enjoy your order!'                   },
    ];

    function renderTracking(order) {
      const currentStep = statusSteps[order.status] ?? 0;
      const container   = document.getElementById('trackingContent');

      const stepsHTML = steps.map((s, i) => {
        const isDone   = i < currentStep;
        const isActive = i === currentStep;
        const cls      = isDone ? 'done' : isActive ? 'active' : '';
        return `
          <div class="step ${cls}">
            <div class="step-icon">${s.icon}</div>
            <div class="step-text">
              <div class="step-title">${s.title}</div>
              <div class="step-subtitle">${s.subtitle}</div>
            </div>
          </div>`;
      }).join('');

      const itemsHTML = order.items ? order.items.map(item => `
        <div class="order-item-row">
          <span>${item.emoji || '🍽️'} ${item.product_name} x${item.quantity}</span>
          <span>₹${item.price * item.quantity}</span>
        </div>
      `).join('') : '';

      container.innerHTML = `
        <div class="tracking-card">
          <h2>Order #CE${order.id}</h2>
          <p>Status: <strong style="color:#f97316;">${order.status.replace('_',' ').toUpperCase()}</strong></p>
          <div class="steps">${stepsHTML}</div>
          <div class="agent-card">
            <div class="agent-emoji">🧑‍🦱</div>
            <div>
              <div class="agent-name">Rahul K.</div>
              <div class="agent-sub">Your delivery agent</div>
            </div>
            <div style="margin-left:auto; font-size:24px;">📞</div>
          </div>
        </div>

        <div class="order-items-card">
          <h3>🛒 Order Items</h3>
          ${itemsHTML}
          <div class="order-total-row">
            <span>Total Paid</span>
            <span>₹${order.total}</span>
          </div>
        </div>

        <div style="text-align:center;">
          <a href="home.html" style="color:#f97316; font-size:14px; text-decoration:none;">
            ← Order more items
          </a>
        </div>
      `;
    }

    function renderNoOrder() {
      document.getElementById('trackingContent').innerHTML = `
        <div class="no-order">
          <div>📦</div>
          <p>No active order found!</p>
          <a href="home.html">Browse Items</a>
        </div>`;
    }

    function loadOrder() {
      const orderId = localStorage.getItem('last_order_id');
      const token   = localStorage.getItem('token');

      if (!orderId || !token) {
        renderNoOrder();
        return;
      }

      fetch(API + '/orders/' + orderId, {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => res.json())
      .then(order => {
        if (order.error) { renderNoOrder(); return; }
        renderTracking(order);
        // Auto refresh every 10 seconds
        setTimeout(loadOrder, 10000);
      })
      .catch(() => renderNoOrder());
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const el   = document.getElementById('cartCount');
      if (el) {
        const total = cart.reduce((sum, i) => sum + i.qty, 0);
        el.textContent = '🛒 Cart (' + total + ')';
      }
    }

    loadOrder();
    updateCartCount();
  </script>

</body>
</html>
